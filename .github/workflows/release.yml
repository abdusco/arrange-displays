name: Swift Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build Swift application
        run: |
          chmod +x build.sh
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          VERSION="${{ github.ref_name }}-${COMMIT_SHORT}"
          echo "Building version: $VERSION"
          ARCH=${{ matrix.arch }} VERSION="$VERSION" ./build.sh

      - name: Package binary for release
        run: |
          mkdir -p release
          cp arrange_displays-${{ matrix.arch }} release/arrange_displays-${{ matrix.arch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: arrange_displays-${{ matrix.arch }}
          path: release/arrange_displays-${{ matrix.arch }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: binaries/*